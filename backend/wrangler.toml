name = "claude-top"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding
# Real IDs are injected by CI via envsubst — never commit actual IDs here.
[[d1_databases]]
binding = "DB"
database_name = "claude-top-db"
database_id = "${CLOUDFLARE_D1_DATABASE_ID}"

# KV namespace for leaderboard cache
[[kv_namespaces]]
binding = "LEADERBOARD"
id = "${CLOUDFLARE_KV_NAMESPACE_ID}"

# Secrets are set via: wrangler secret put <NAME>
# They are never stored in this file.
#   wrangler secret put JWT_SECRET
#   wrangler secret put GITHUB_CLIENT_ID
